services:
  - type: web
    name: dice-tactics
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dice-tactics-db
          property: connectionString

databases:
  - name: dice-tactics-db
    plan: free
