<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dice Dungeon</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root { height: 100%; }
    body { background: #0d0a04; }

    /* Scrollbar fantasía */
    ::-webkit-scrollbar       { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #5a3a10; border-radius: 3px; }

    /* Botones */
    button { font-family: inherit; transition: filter 0.15s, transform 0.1s; }
    button:hover:not(:disabled)  { filter: brightness(1.18); }
    button:active:not(:disabled) { transform: scale(0.97); }

    /* Inputs */
    input { font-family: inherit; }
    input::placeholder { opacity: 0.4; }

    /* Cartas en fila horizontal */
    .card-row::-webkit-scrollbar-thumb { background: #3a2a50; }

    /* Animaciones globales */
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-58px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }
    @keyframes dieRoll {
      0%, 100% { transform: rotate(-5deg) scale(1.04); }
      50%       { transform: rotate(5deg)  scale(1.04); }
    }
    @keyframes enemyHit {
      0%, 100% { transform: translateX(0); }
      30%       { transform: translateX(12px); }
      70%       { transform: translateX(-12px); }
    }
    @keyframes playerHit {
      0%, 100% { transform: translateX(0); }
      30%       { transform: translateX(-10px); }
      70%       { transform: translateX(10px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Fade-in en pantallas */
    #root > * { animation: fadeIn 0.35s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Datos del juego (plain JS, sin JSX) -->
  <script src="game/data.js"></script>

  <!-- Componentes React (orden importa: Combat y ShopEvent antes de App) -->
  <script type="text/babel" src="game/Combat.jsx"></script>
  <script type="text/babel" src="game/ShopEvent.jsx"></script>
  <script type="text/babel" src="game/App.jsx"></script>
</body>
</html>
